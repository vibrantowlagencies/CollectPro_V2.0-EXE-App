<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
/* ── DESIGN TOKENS — identical to TC App ───────────── */
:root{
  --bg:#f0fdfa; --bg2:#ffffff; --bg3:#f1f4f8;
  --accent:#0d9488; --accent-lt:#f0fdfa; --accent-dk:#0f766e;
  --blue:#0d9488; --blue-lt:#f0fdfa;
  --green:#16a34a; --green-lt:#f0fdf4;
  --red:#dc2626; --red-lt:#fef2f2;
  --amber:#d97706; --amber-lt:#fffbeb;
  --purple:#7c3aed; --purple-lt:#f5f3ff;
  --cyan:#0891b2; --cyan-lt:#ecfeff;
  --border:#e4e8ef; --border2:#d0d7e3;
  --text:#0f172a; --text2:#475569; --text3:#94a3b8;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06);
  --shadow:0 4px 16px rgba(0,0,0,.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
  --r:14px;
  --fh:'Sora',sans-serif;
  --fm:'JetBrains Mono',monospace;
  --fb:'Plus Jakarta Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;width:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--fb);-webkit-font-smoothing:antialiased}

/* ── ANIMATIONS ─────────────────────────────────────── */
@keyframes fadeUp  {from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn  {from{opacity:0}to{opacity:1}}
@keyframes shake   {0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
@keyframes spin    {to{transform:rotate(360deg)}}
@keyframes dotPop  {0%{transform:scale(.8);opacity:.4}50%{transform:scale(1.2);opacity:1}100%{transform:scale(1);opacity:1}}
@keyframes slideIn {from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse   {0%,100%{opacity:1}50%{opacity:.5}}

/* ── LOGIN ──────────────────────────────────────────── */
.login-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(145deg,#f0fdfa,#f8f9fb,#fff);padding:24px;
}
.login-card{
  background:#fff;border:1px solid var(--border);border-radius:24px;
  padding:44px 36px;width:100%;max-width:390px;
  box-shadow:var(--shadow-lg);animation:fadeUp .4s ease;
}
.login-card.shake{animation:shake .4s ease}
.login-logo-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:36px}
.login-logo{
  width:72px;height:72px;
  background:linear-gradient(135deg,var(--accent),var(--accent-dk));
  border-radius:20px;display:flex;align-items:center;justify-content:center;
  font-family:var(--fh);font-weight:800;font-size:22px;color:#fff;
  box-shadow:0 8px 28px rgba(13,148,136,.28);letter-spacing:.5px;
}
.login-title{font-family:var(--fh);font-size:24px;font-weight:700;color:var(--text)}
.login-sub  {font-size:13px;color:var(--text3);text-align:center;line-height:1.5}

/* Role pill — distinguishes Exec App from TC App visually */
.role-pill{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--blue-lt);border:1px solid #99f6e4;
  color:var(--teal);border-radius:20px;padding:5px 14px;
  font-family:var(--fm);font-size:11px;font-weight:700;
  letter-spacing:.5px;margin-top:4px;
}

/* Form */
.form-group {margin-bottom:18px}
.form-label {font-size:11px;font-family:var(--fm);letter-spacing:1px;color:var(--text3);margin-bottom:8px;display:block;text-transform:uppercase}
.form-input,.form-select{
  width:100%;background:var(--bg3);border:1.5px solid var(--border);
  border-radius:12px;padding:13px 15px;color:var(--text);
  font-family:var(--fb);font-size:15px;outline:none;transition:all .2s;-webkit-appearance:none;
}
.form-input:focus,.form-select:focus{
  border-color:var(--accent);background:#fff;
  box-shadow:0 0 0 3px rgba(13,148,136,.1);
}
.form-input.pin-field{font-family:var(--fm);font-size:22px;text-align:center;letter-spacing:.3em}

/* City select chevron */
.select-wrap{position:relative}
.select-wrap::after{
  content:'▾';position:absolute;right:14px;top:50%;
  transform:translateY(-50%);color:var(--text3);font-size:14px;
  pointer-events:none;
}

/* PIN dots */
.pin-dots{display:flex;gap:10px;justify-content:center;margin:4px 0 20px}
.pin-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--border2);background:transparent;transition:all .15s ease}
.pin-dot.filled{background:var(--accent);border-color:var(--accent);animation:dotPop .2s ease}

/* Button */
.btn-login{
  width:100%;padding:15px;
  background:linear-gradient(135deg,var(--accent),var(--accent-dk));
  border:none;border-radius:14px;color:#fff;
  font-family:var(--fh);font-size:17px;font-weight:700;
  cursor:pointer;box-shadow:0 4px 20px rgba(13,148,136,.3);
  transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-login:active{transform:scale(.98)}
.btn-login:disabled{opacity:.55;cursor:not-allowed;box-shadow:none}
.login-error{
  background:var(--red-lt);border:1px solid rgba(220,38,38,.2);
  border-radius:10px;padding:11px 14px;font-size:13px;color:var(--red);
  margin-top:12px;animation:fadeIn .2s ease;text-align:center;
}

/* ── APP SHELL ──────────────────────────────────────── */
.app{display:flex;flex-direction:column;height:100vh}
.header{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:0 16px;height:56px;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:100;
  box-shadow:var(--shadow-sm);flex-shrink:0;
}
.brand{display:flex;align-items:center;gap:10px}
.brand-logo{
  width:34px;height:34px;
  background:linear-gradient(135deg,var(--accent),var(--accent-dk));
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-family:var(--fh);font-weight:800;font-size:11px;color:#fff;letter-spacing:.5px;
}
.brand-name{font-family:var(--fh);font-size:16px;font-weight:700;color:var(--text)}
.brand-role{
  font-family:var(--fm);font-size:10px;
  color:var(--teal);background:var(--blue-lt);
  padding:3px 9px;border-radius:20px;
  border:1px solid rgba(13,148,136,.2);letter-spacing:.5px;
}
.hdr-right{display:flex;align-items:center;gap:8px}
.staff-badge{font-family:var(--fm);font-size:11px;color:var(--text2);background:var(--bg3);padding:5px 10px;border-radius:8px;border:1px solid var(--border)}
.city-badge{
  font-family:var(--fm);font-size:10px;font-weight:700;
  color:var(--teal);background:var(--blue-lt);
  padding:4px 9px;border-radius:20px;
  border:1px solid rgba(13,148,136,.2);letter-spacing:.5px;
}
.logout-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--text3);cursor:pointer;padding:5px 10px;font-size:12px;font-family:var(--fb);transition:all .15s}
.logout-btn:hover{border-color:var(--red);color:var(--red)}

/* ── BOTTOM NAV ─────────────────────────────────────── */
.bnav{display:flex;background:var(--bg2);border-top:1px solid var(--border);height:60px;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;cursor:pointer;color:var(--text3);font-size:10px;font-family:var(--fb);font-weight:600;transition:color .2s;padding:0}
.ni .ico{font-size:20px}
.ni.on{color:var(--teal)}

/* ── PAGES ──────────────────────────────────────────── */
.main-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page{display:none;padding-bottom:80px}
.page.on{display:block;animation:fadeIn .2s ease}

/* ── DASHBOARD ──────────────────────────────────────── */
.dash-wrap{padding:16px}
.dash-greeting{font-family:var(--fh);font-size:20px;font-weight:700;margin-bottom:2px}
.dash-date{font-size:12px;color:var(--text3);font-family:var(--fm);margin-bottom:16px}
.dash-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.dash-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--shadow-sm)}
.dash-card-icon{font-size:20px;margin-bottom:8px}
.dash-card-val{font-family:var(--fh);font-size:30px;font-weight:800;line-height:1}
.dash-card.teal .dash-card-val{color:var(--teal)}
.dash-card.green  .dash-card-val{color:var(--green)}
.dash-card.orange .dash-card-val{color:var(--accent)}
.dash-card.red    .dash-card-val{color:var(--red)}
.dash-card-lbl{font-size:11px;color:var(--text3);margin-top:4px;font-weight:500}

/* Session card */
.session-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin:0 0 12px;box-shadow:var(--shadow-sm);animation:slideIn .3s ease}
.session-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.session-row:last-child{border-bottom:none}
.session-label{font-size:11px;color:var(--text3);font-family:var(--fm);text-transform:uppercase;letter-spacing:.5px}
.session-value{font-size:12px;color:var(--text);font-family:var(--fm);font-weight:500}
.token-active{font-size:11px;color:var(--green);font-family:var(--fm);font-weight:600;display:flex;align-items:center;gap:4px}
.token-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}

/* Coming soon */
.coming-soon{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center}
.coming-soon-icon{width:64px;height:64px;background:var(--blue-lt);border:1px solid rgba(13,148,136,.2);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:16px}
.coming-soon-title{font-family:var(--fh);font-size:17px;font-weight:700;margin-bottom:8px}
.coming-soon-sub{font-size:13px;color:var(--text3);line-height:1.6;max-width:260px}

/* Spinner */
.spinner{width:20px;height:20px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}

/* Toast */
.toast-wrap{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);z-index:400;animation:fadeUp .25s ease}
.toast-inner{background:var(--text);color:#fff;border-radius:14px;padding:13px 22px;font-size:14px;font-weight:500;white-space:nowrap;box-shadow:var(--shadow-lg);font-family:var(--fb)}
.toast-inner.success{background:var(--green)}
.toast-inner.error  {background:var(--red)}
.toast-inner.warning{background:var(--amber)}

/* Loading */
.load-overlay{position:fixed;inset:0;background:rgba(248,249,251,.88);z-index:300;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px}
.load-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.load-text{font-family:var(--fm);font-size:13px;color:var(--text2)}


/* ── VISIT ACCOUNTS ────────────────────────────────── */
.list-hdr{padding:12px 14px 10px;position:sticky;top:0;background:var(--bg2);z-index:10;border-bottom:1px solid var(--border)}
.list-hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.list-ttl{font-family:var(--fh);font-size:15px;font-weight:700}
.rfr-btn{background:var(--accent-lt);border:1px solid rgba(13,148,136,.3);color:var(--accent);border-radius:8px;padding:5px 10px;font-family:var(--fh);font-size:12px;font-weight:600;cursor:pointer}
.fchips{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.fchips::-webkit-scrollbar{display:none}
.fchip{flex-shrink:0;padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--bg2);font-family:var(--fh);font-size:11px;font-weight:600;color:var(--text3);cursor:pointer;white-space:nowrap;transition:all .15s}
.fchip.on{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── VISIT CARD ────────────────────────────────────── */
.vc{margin:0 14px 10px;padding:14px;border-radius:var(--r);border:1.5px solid var(--border);background:var(--bg2);box-shadow:var(--shadow-sm);animation:slideIn .2s ease;cursor:pointer}
.vc.today{border-left:4px solid var(--accent)}
.vc.overdue{border-left:4px solid var(--red)}
.vc.future{border-left:4px solid var(--green)}
.vc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.vc-name{font-family:var(--fh);font-size:15px;font-weight:700}
.vc-no{font-family:var(--fm);font-size:11px;color:var(--text3);margin-top:1px}
.vc-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:.3px;text-transform:uppercase;flex-shrink:0;margin-left:8px}
.vb-appt{background:var(--accent-lt);color:var(--accent);border:1px solid rgba(13,148,136,.2)}
.vb-nr{background:var(--red-lt);color:var(--red);border:1px solid #fecaca}
.vb-reschedule{background:var(--amber-lt);color:var(--amber);border:1px solid #fde68a}
.vc-row{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);margin-bottom:3px}
.vc-appt-strip{background:var(--accent-lt);border:1px solid rgba(13,148,136,.2);border-radius:8px;padding:6px 10px;display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--accent);margin:8px 0}
.vc-appt-strip.overdue{background:var(--red-lt);border-color:#fecaca;color:var(--red)}
.vc-actions{display:flex;gap:7px;margin-top:10px}
.vca{flex:1;padding:9px;border-radius:10px;border:none;cursor:pointer;font-family:var(--fh);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:4px;transition:all .15s}
.vca:active{transform:scale(.97)}
.vca.call{background:var(--green-lt);color:var(--green);border:1.5px solid #86efac}
.vca.wa{background:#f0fdf4;color:#15803d;border:1.5px solid #86efac}
.vca.log{background:var(--accent-lt);color:var(--accent);border:1.5px solid rgba(13,148,136,.2)}

/* ── LOG VISIT SHEET ───────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease}
.sheet{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:14px 16px 36px;animation:slideIn .25s ease}
.sh-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px}
.sh-title{font-family:var(--fh);font-size:17px;font-weight:700;margin-bottom:4px}
.sh-sub{font-size:13px;color:var(--text3);margin-bottom:14px}
.sh-cust{background:var(--accent-lt);border:1px solid rgba(13,148,136,.15);border-radius:var(--r);padding:12px 14px;margin-bottom:14px}
.sh-cust-name{font-family:var(--fh);font-size:15px;font-weight:700}
.sh-cust-acc{font-family:var(--fm);font-size:11px;color:var(--accent)}
.og-title{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.og-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px}
.ob{padding:10px 7px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg2);font-family:var(--fh);font-size:11px;font-weight:600;color:var(--text);cursor:pointer;transition:all .15s;text-align:center}
.ob:active{transform:scale(.97)}
.ob.sel-teal{border-color:var(--accent);background:var(--accent);color:#fff}
.ob.sel-red{border-color:var(--red);background:var(--red);color:#fff}
.ob.sel-amber{border-color:var(--amber);background:var(--amber);color:#fff}
.ob.sel-purple{border-color:#7c3aed;background:#7c3aed;color:#fff}
.sl-label{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:7px}
.rm-ta{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--r);font-family:var(--fb);font-size:14px;color:var(--text);resize:none;outline:none;transition:border-color .2s;min-height:72px;background:var(--bg3)}
.rm-ta:focus{border-color:var(--accent);background:#fff}
.dt-inp{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--r);font-family:var(--fb);font-size:15px;color:var(--text);outline:none;transition:border-color .2s;margin-bottom:14px;background:var(--bg3);-webkit-appearance:none}
.dt-inp:focus{border-color:var(--accent);background:#fff}
.sub-btn{width:100%;padding:14px;border-radius:var(--r);border:none;background:linear-gradient(135deg,var(--accent),var(--accent-dk));color:#fff;font-family:var(--fh);font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;margin-top:8px;box-shadow:0 4px 14px rgba(13,148,136,.3)}
.sub-btn:disabled{background:var(--border);color:var(--text3);cursor:not-allowed;box-shadow:none}
.sub-btn:not(:disabled):active{transform:scale(.99)}
.cnl-lnk{display:block;text-align:center;margin-top:12px;font-size:14px;color:var(--text3);cursor:pointer;font-weight:500}

/* ── STORE TAB ─────────────────────────────────────── */
.store-wrap{padding:14px}
.store-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:14px;box-shadow:var(--shadow-sm)}
.store-card-title{font-family:var(--fh);font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.inp{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r);padding:12px 14px;color:var(--text);font-family:var(--fb);font-size:14px;outline:none;transition:all .2s;-webkit-appearance:none;margin-bottom:10px}
.inp:focus{border-color:var(--accent);background:#fff}
.store-sub-btn{width:100%;padding:13px;border-radius:var(--r);border:none;background:linear-gradient(135deg,var(--accent),var(--accent-dk));color:#fff;font-family:var(--fh);font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 12px rgba(13,148,136,.25)}
.store-sub-btn:disabled{background:var(--border);color:var(--text3);cursor:not-allowed;box-shadow:none}
.store-history{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;margin-top:10px;font-size:12px;color:var(--text2)}

/* ── REPORT TAB ────────────────────────────────────── */
.rpt-hdr{background:linear-gradient(135deg,#0f766e,#0d9488);padding:18px 16px;margin-bottom:14px}
.rpt-date{font-size:11px;color:rgba(255,255,255,.55);font-family:var(--fm);margin-bottom:3px}
.rpt-title{font-family:var(--fh);font-size:18px;font-weight:700;color:#fff}
.rpt-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.rpt-stat{background:rgba(255,255,255,.12);border-radius:10px;padding:10px;text-align:center}
.rpt-val{font-family:var(--fm);font-size:20px;color:#fff;font-weight:500}

</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 lib/constants.js
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const CONFIG = {
  API_URL:      'https://script.google.com/macros/s/AKfycbyRb7oEMdppJKouU5xCAQVq-IauFaugqXslscYChoFaXkvWzIQzHCg9q5u3AZWAlxB_Pg/exec',
  CLIENT_ID:    'VOA_CBE',
  SESSION_KEY:  'voa_session_exec',   // different from TC App
  REFRESH_MS:   25 * 60 * 1000,
  ALLOWED_ROLE: 'EXECUTIVE',         // EXECUTIVE only
  APP_VERSION:  'v3.0.0',
  CITIES:       ['CBE', 'CHN'],
};

const NAV_ITEMS = [
  { id:'dash',    icon:'🏠', label:'Home'    },
  { id:'visits',  icon:'📍', label:'Visits'  },
  { id:'store',   icon:'📦', label:'Store'   },
  { id:'report',  icon:'📊', label:'Report'  },
];

const STAT_CARDS = [
  { id:'assigned',  cls:'teal',   icon:'📋', label:'Assigned'     },
  { id:'today',     cls:'green',  icon:'📅', label:'Visits Today' },
  { id:'collected', cls:'orange', icon:'✅', label:'MTD Collected' },
  { id:'pending',   cls:'red',    icon:'⏳', label:'Still Pending' },
];

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 lib/api.js
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const Api = {
  async get(params) {
    const url = new URL(CONFIG.API_URL);
    url.searchParams.append('client_id', CONFIG.CLIENT_ID);
    Object.entries(params).forEach(([k,v]) => url.searchParams.append(k, String(v)));
    const res  = await fetch(url.toString());
    if (!res.ok) throw new Error('Network error: ' + res.status);
    const json = await res.json();
    if (!json.success) throw new Error(json.error || 'Request failed');
    return json.data;
  },
  async post(body) {
    const r = await fetch(CONFIG.API_URL, {
      method:'POST', headers:{'Content-Type':'text/plain'},
      body: JSON.stringify({ client_id: CONFIG.CLIENT_ID, ...body })
    });
    if (!r.ok) throw new Error('Network error: ' + r.status);
    const j = await r.json();
    if (!j.success) throw new Error(j.error || 'Request failed');
    return j.data;
  }
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 lib/session.js
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const SessionStore = {
  save(data) { try { localStorage.setItem(CONFIG.SESSION_KEY, JSON.stringify(data)); } catch {} },
  load() {
    try {
      const raw = localStorage.getItem(CONFIG.SESSION_KEY);
      if (!raw) return null;
      const s = JSON.parse(raw);
      const parts = (s.token || '').split('|');
      if (parts.length !== 5 || Date.now() > parseInt(parts[4])) { this.clear(); return null; }
      return s;
    } catch { return null; }
  },
  clear() { try { localStorage.removeItem(CONFIG.SESSION_KEY); } catch {} }
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 lib/utils.js
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const Utils = {
  getGreeting() {
    const h = new Date().getHours();
    if (h < 12) return 'Good morning';
    if (h < 17) return 'Good afternoon';
    return 'Good evening';
  },
  getDateStr() {
    return new Date().toLocaleDateString('en-IN', {
      weekday:'long', day:'numeric', month:'long', year:'numeric'
    });
  },
  sanitizePin: (v) => String(v).replace(/\D/g,'').slice(0,4),
  firstName:   (n) => (n||'').split(' ')[0],
  todayStr() {
    const d=new Date();
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  },
  tomorrowStr() {
    const d=new Date(); d.setDate(d.getDate()+1);
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  },
  buildWALink(mobile, msg) {
    const m=String(mobile).replace(/\D/g,'');
    const num=m.length===10?'91'+m:m;
    return 'https://wa.me/'+num+'?text='+encodeURIComponent(msg);
  },
};

const STATUS_LABELS = {
  FRESH:'Fresh', CALLED:'Called', APPT_FIXED:'Appt Fixed',
  NOT_VISITED:'Not Visited', RESCHEDULED:'Rescheduled',
  NOT_REACHABLE:'Not Reachable', COLLECTED:'Collected',
  STRIKE_1:'Strike 1', STRIKE_2:'Strike 2', STRIKE_3:'Strike 3',
  ISSUE_REFUND:'Refund Issue', ISSUE_RECONNECTION:'Reconnection',
  ISSUE_MAIL:'Mail Confirm', ISSUE_JBOX:'JBox Issue', ISSUE_ADDR:'Addr Change',
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 hooks/useToast.js
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function useToast() {
  const [toast, setToast] = useState(null);
  const show = useCallback((msg, type='error') => setToast({ msg, type }), []);
  const hide = useCallback(() => setToast(null), []);
  return { toast, showToast: show, hideToast: hide };
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 hooks/useAuth.js
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function useAuth({ onSuccess, onError }) {
  const [loading, setLoading] = useState(false);
  const login = useCallback(async (city, staffId, pin) => {
    setLoading(true);
    try {
      const data = await Api.get({
        action:  'login',
        city:    city,
        staffId: String(staffId).trim().toUpperCase(),
        pin:     pin.trim()
      });
      if (data.role !== CONFIG.ALLOWED_ROLE) {
        throw new Error('This app is for Field Executives only');
      }
      const session = {
        token:     data.token,
        staffId:   data.staffId,
        staffName: data.staffName,
        role:      data.role,
        city:      data.city,
        clientId:  data.clientId,
        loginAt:   Date.now()
      };
      SessionStore.save(session);
      onSuccess(session);
    } catch (e) {
      const msg = e.message.includes('Invalid') ? 'Invalid Staff ID or PIN'
                : e.message.includes('attempts') ? 'Too many attempts. Wait 10 min.'
                : e.message || 'Login failed';
      onError(msg);
    } finally { setLoading(false); }
  }, [onSuccess, onError]);
  return { login, loading };
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 hooks/useTokenRefresh.js
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function useTokenRefresh(session, onExpired) {
  const timerRef = useRef(null);
  useEffect(() => {
    if (!session) return;
    timerRef.current = setInterval(async () => {
      try {
        const data = await Api.get({
          action: 'login', city: session.city,
          staffId: session.staffId, token: session.token
        });
        SessionStore.save({ ...session, token: data.token, loginAt: Date.now() });
      } catch { onExpired(); }
    }, CONFIG.REFRESH_MS);
    return () => clearInterval(timerRef.current);
  }, [session]);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 components/ui/Toast.jsx
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const Toast = ({ msg, type='error', onDone }) => {
  useEffect(() => { const t = setTimeout(onDone, 3200); return () => clearTimeout(t); }, []);
  return <div className="toast-wrap"><div className={`toast-inner ${type}`}>{msg}</div></div>;
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 components/ui/PinDots.jsx
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const PinDots = ({ length=0, total=4 }) => (
  <div className="pin-dots">
    {Array.from({ length:total }).map((_,i) => (
      <div key={i} className={`pin-dot${length > i ? ' filled' : ''}`} />
    ))}
  </div>
);

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 components/ui/BrandLogo.jsx
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const BrandLogo = ({ size='lg' }) => {
  const lg = size === 'lg';
  return (
    <div style={{
      width: lg?72:34, height: lg?72:34,
      background:'linear-gradient(135deg,var(--accent),var(--accent-dk))',
      borderRadius: lg?20:10,
      display:'flex', alignItems:'center', justifyContent:'center',
      fontFamily:'var(--fh)', fontWeight:800, fontSize: lg?22:11,
      color:'#fff', letterSpacing:'.5px', flexShrink:0,
      boxShadow: lg?'0 8px 28px rgba(13,148,136,.28)':'none'
    }}>VOA</div>
  );
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 components/layout/AppHeader.jsx
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const AppHeader = ({ session, onLogout }) => (
  <div className="header">
    <div className="brand">
      <BrandLogo size="sm" />
      <span className="brand-name">CollectPro</span>
      <span className="brand-role">EXECUTIVE</span>
    </div>
    <div className="hdr-right">
      <span className="city-badge">{session.city}</span>
      <span className="staff-badge">{Utils.firstName(session.staffName)}</span>
      <button className="logout-btn" onClick={onLogout}>✕</button>
    </div>
  </div>
);

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 components/layout/BottomNav.jsx
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const BottomNav = ({ active, onChange }) => (
  <div className="bnav">
    {NAV_ITEMS.map(n => (
      <button key={n.id} className={`ni${active===n.id?' on':''}`} onClick={() => onChange(n.id)}>
        <span className="ico">{n.icon}</span>
        {n.label}
      </button>
    ))}
  </div>
);

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 components/auth/SessionCard.jsx
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const SessionCard = ({ session }) => (
  <div className="session-card">
    <div style={{ fontFamily:'var(--fh)', fontSize:13, fontWeight:700, marginBottom:12, display:'flex', alignItems:'center', gap:6 }}>
      <span>🔐</span> Active Session
    </div>
    {[
      ['Staff ID',  session.staffId],
      ['Name',      session.staffName],
      ['Role',      session.role],
      ['City',      session.city],
      ['Client',    session.clientId],
    ].map(([k,v]) => (
      <div key={k} className="session-row">
        <span className="session-label">{k}</span>
        <span className="session-value">{v}</span>
      </div>
    ))}
    <div className="session-row">
      <span className="session-label">Token</span>
      <span className="token-active">
        <span className="token-dot" /> Active · auto-refresh 25 min
      </span>
    </div>
  </div>
);

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 app/exec/dashboard/page.jsx — DashboardPage
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const DashboardPage = ({ session, showToast, onTabChange }) => {
  const [dash,setDash]   = useState(null);
  const [loading,setLoading] = useState(true);
  useEffect(()=>{
    Api.get({action:'get_exec_dashboard',token:session.token,staffId:session.staffId,city:session.city})
      .then(d=>setDash(d)).catch(()=>{})
      .finally(()=>setLoading(false));
  },[]);
  const vals = { assigned:dash?.totalAssigned, today:dash?.apptToday, collected:dash?.collectedMTD, pending:dash?.totalAssigned };
  return (
    <div className="dash-wrap">
      <div className="dash-greeting">{Utils.getGreeting()}, {Utils.firstName(session.staffName)} 👋</div>
      <div className="dash-date">{Utils.getDateStr()}</div>
      <div className="dash-cards">
        {STAT_CARDS.map(c=>(
          <div key={c.id} className={`dash-card ${c.cls}`} onClick={()=>onTabChange&&onTabChange('visits')} style={{cursor:'pointer'}}>
            <div className="dash-card-icon">{c.icon}</div>
            <div className="dash-card-val">{loading?<div style={{width:32,height:28}} className="skeleton"/>:vals[c.id]??'—'}</div>
            <div className="dash-card-lbl">{c.label}</div>
          </div>
        ))}
      </div>
      {dash?.apptToday>0&&(
        <div style={{background:'var(--accent-lt)',border:'1px solid rgba(13,148,136,.2)',borderRadius:'var(--r)',padding:'12px 14px',marginTop:4,fontSize:13,color:'var(--accent)',fontWeight:600,display:'flex',alignItems:'center',gap:8}}>
          📅 {dash.apptToday} appointment{dash.apptToday>1?'s':''} scheduled today
        </div>
      )}
    </div>
  );
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  VISIT OUTCOMES
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const VISIT_GROUPS = [
  { title:'✅ Successful',  color:'teal',   items:[
    { label:'✅ Collected',      value:'Collected',     needsDate:false },
  ]},
  { title:'Not Available',  color:'amber',  items:[
    { label:'🏠 Not Home',       value:'Not Home',      needsDate:false },
    { label:'📅 Rescheduled',    value:'Rescheduled',   needsDate:true  },
    { label:'✈️ Out of Station', value:'Out of Station',needsDate:false },
  ]},
  { title:'Issues',         color:'purple', items:[
    { label:'💰 Refund Issue',   value:'Refund Issue',  needsDate:false },
    { label:'🔌 Reconnection',   value:'Reconnection',  needsDate:false },
    { label:'📧 Mail Confirm',   value:'Mail Confirmation',needsDate:false},
    { label:'📦 Junction Box',   value:'Junction Box Issue',needsDate:false},
    { label:'📍 Addr Change',    value:'Address Change',needsDate:false },
  ]},
  { title:'Non Recoverable',color:'red',    items:[
    { label:'❌ Wrong Number',   value:'Wrong Number',  needsDate:false },
    { label:'🏚️ Addr Not Found', value:'Address Not Found',needsDate:false},
    { label:'🏠 Not Willing',    value:'Not Willing',   needsDate:false },
  ]},
];
const ALL_VISIT_OUTCOMES = VISIT_GROUPS.flatMap(g=>g.items);

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  LOG VISIT SHEET
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const LogVisitSheet = ({ account, session, onClose, onSuccess, showToast }) => {
  const [outcome,  setOutcome]  = useState('');
  const [remark,   setRemark]   = useState('');
  const [apptDate, setApptDate] = useState(Utils.tomorrowStr());
  const [loading,  setLoading]  = useState(false);
  const selOut = ALL_VISIT_OUTCOMES.find(o=>o.value===outcome);
  const needsDate = selOut?.needsDate;
  const isCollected = outcome==='Collected';

  const getSelClass = (g) => ({
    '✅ Successful':'sel-teal','Not Available':'sel-amber',
    'Issues':'sel-purple','Non Recoverable':'sel-red'
  }[g]||'sel-teal');

  const handleSubmit = async () => {
    if(!outcome){showToast('Select an outcome','error');return;}
    if(needsDate&&!apptDate){showToast('Select new appointment date','error');return;}
    setLoading(true);
    try {
      await Api.post({
        action:'log_visit', token:session.token,
        city:session.city, staffId:session.staffId,
        accountNo:account.accountNo, outcome,
        execRemark:remark, newApptDate:needsDate?apptDate:''
      });
      onSuccess(account.name+' → '+outcome+(isCollected?' ✅':''));
      onClose();
    } catch(e){showToast(e.message,'error');}
    finally{setLoading(false);}
  };

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="sheet">
        <div className="sh-handle"/>
        <div className="sh-title">Log Visit Outcome</div>
        <div className="sh-sub">Record the result of your field visit</div>
        <div className="sh-cust">
          <div className="sh-cust-name">{account.name}</div>
          <div className="sh-cust-acc">📞 {account.mobile} · {account.accountNo}</div>
        </div>
        {VISIT_GROUPS.map(g=>(
          <div key={g.title} style={{marginBottom:12}}>
            <div className="og-title">{g.title}</div>
            <div className="og-grid">
              {g.items.map(item=>(
                <button key={item.value}
                  className={`ob${outcome===item.value?' '+getSelClass(g.title):''}`}
                  onClick={()=>setOutcome(item.value)}>
                  {item.label}
                </button>
              ))}
            </div>
          </div>
        ))}
        {needsDate&&(
          <>
            <div className="sl-label" style={{marginBottom:7}}>New Appointment Date</div>
            <input type="date" className="dt-inp" value={apptDate}
              min={Utils.todayStr()} onChange={e=>setApptDate(e.target.value)}/>
          </>
        )}
        <div className="sl-label" style={{marginBottom:7}}>Visit Remark</div>
        <textarea className="rm-ta" value={remark}
          onChange={e=>setRemark(e.target.value)}
          placeholder={isCollected?'Collection confirmed. Router received.':'Add notes about this visit…'}
          rows={3}/>
        <button className="sub-btn" onClick={handleSubmit} disabled={!outcome||loading}>
          {loading?'Saving…':isCollected?'✅ Confirm Collection':'✅ Submit Outcome'}
        </button>
        <div className="cnl-lnk" onClick={onClose}>Cancel</div>
      </div>
    </div>
  );
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  VISIT CARD
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const VisitCard = ({ account, onLog }) => {
  const [expanded,setExpanded] = useState(false);
  const today = Utils.todayStr();
  const isToday   = account.apptDate === today;
  const isOverdue = account.apptDate && account.apptDate < today;
  const cls = isOverdue?'overdue':isToday?'today':'future';

  const call = () => { window.location.href='tel:'+account.mobile.replace(/\D/g,''); };
  const wa   = () => {
    const msg=`Hi, I'm from VOA field team visiting for ACT router collection. Account: ${account.accountNo}. I'll be arriving shortly. Please be available.`;
    window.open(Utils.buildWALink(account.mobile,msg),'_blank');
  };

  return (
    <div className={`vc ${cls}`} onClick={()=>setExpanded(e=>!e)}>
      <div className="vc-top">
        <div>
          <div className="vc-name">{account.name}</div>
          <div className="vc-no">{account.accountNo}</div>
        </div>
        <span className={`vc-badge ${account.status==='APPT_FIXED'?'vb-appt':account.status==='RESCHEDULED'?'vb-reschedule':'vb-nr'}`}>
          {STATUS_LABELS[account.status]||account.status}
        </span>
      </div>
      <div className="vc-row"><span>📞</span><span style={{fontFamily:'var(--fm)',color:'var(--green)',fontWeight:600}}>{account.mobile}</span></div>
      {expanded&&(
        <>
          <div className="vc-row"><span>📍</span><span>{account.address}, {account.area}</span></div>
          {account.srNumber&&<div className="vc-row"><span>🎫</span><span>SR: {account.srNumber}</span></div>}
          {account.tcRemark&&<div className="vc-row" style={{color:'var(--text3)'}}><span>💬</span><span>TC: {account.tcRemark}</span></div>}
        </>
      )}
      {account.apptDate&&(
        <div className={`vc-appt-strip${isOverdue?' overdue':''}`}>
          📅 {isToday?'Today':isOverdue?'⚠️ Overdue: ':''}{account.apptDate}
        </div>
      )}
      <div className="vc-actions" onClick={e=>e.stopPropagation()}>
        <button className="vca call" onClick={call}>📞 Call</button>
        <button className="vca wa"   onClick={wa  }>💬 WA</button>
        <button className="vca log"  onClick={()=>onLog(account)}>✏️ Log Visit</button>
      </div>
    </div>
  );
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  VISITS PAGE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const VISIT_FILTERS = [
  {label:'All',value:null},{label:'Appt Fixed',value:'APPT_FIXED'},
  {label:'Rescheduled',value:'RESCHEDULED'},{label:'Not Visited',value:'NOT_VISITED'},
];

const VisitsPage = ({ session, showToast }) => {
  const [accounts,setAccounts] = useState([]);
  const [loading, setLoading]  = useState(true);
  const [filter,  setFilter]   = useState(null);
  const [logTarget,setLogTarget]= useState(null);

  const load = useCallback(async()=>{
    setLoading(true);
    try {
      const d=await Api.get({action:'get_exec_accounts',token:session.token,staffId:session.staffId,city:session.city});
      setAccounts(Array.isArray(d)?d:[]);
    } catch(e){showToast(e.message,'error');}
    finally{setLoading(false);}
  },[session]);

  useEffect(()=>{load();},[load]);
  const filtered = useMemo(()=>filter?accounts.filter(a=>a.status===filter):accounts,[accounts,filter]);

  return (
    <div>
      <div className="list-hdr">
        <div className="list-hdr-top">
          <div className="list-ttl">My Visits <span style={{color:'var(--text3)',fontSize:13}}>({filtered.length})</span></div>
          <button className="rfr-btn" onClick={load}>↻ Refresh</button>
        </div>
        <div className="fchips">
          {VISIT_FILTERS.map(f=>(
            <button key={f.label} className={`fchip${filter===f.value?' on':''}`}
              onClick={()=>setFilter(f.value)}>{f.label}</button>
          ))}
        </div>
      </div>
      <div style={{paddingTop:10}}>
        {loading?[1,2,3].map(i=><div key={i} style={{height:120,margin:'0 14px 10px',borderRadius:'var(--r)'}} className="skeleton"/>):
         filtered.length===0?
           <div className="coming-soon">
             <div className="coming-soon-icon">📭</div>
             <div className="coming-soon-title">{filter?'No accounts with this status':'No visits assigned'}</div>
             <div className="coming-soon-sub">Field visits will appear here after telecallers fix appointments.</div>
           </div>:
           filtered.map(a=><VisitCard key={a.accountNo} account={a} onLog={setLogTarget}/>)
        }
      </div>
      {logTarget&&<LogVisitSheet account={logTarget} session={session}
        onClose={()=>setLogTarget(null)} showToast={showToast}
        onSuccess={msg=>{showToast(msg,'success');load();}}/>}
    </div>
  );
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  STORE PAGE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const StorePage = ({ session, showToast }) => {
  const [accountNo,setAccountNo] = useState('');
  const [remark,   setRemark]    = useState('');
  const [loading,  setLoading]   = useState(false);
  const [submitted,setSubmitted] = useState([]);

  const handleSubmit = async() => {
    if(!accountNo.trim()){showToast('Enter Account Number','error');return;}
    setLoading(true);
    try {
      const d=await Api.post({
        action:'submit_store', token:session.token,
        staffId:session.staffId, city:session.city,
        accountNo:accountNo.trim(), remark, batchNo:''
      });
      showToast('Store submission recorded — '+d.submissionId,'success');
      setSubmitted(s=>[{accountNo:accountNo.trim(),id:d.submissionId,time:new Date().toLocaleTimeString('en-IN')},...s.slice(0,4)]);
      setAccountNo(''); setRemark('');
    } catch(e){showToast(e.message,'error');}
    finally{setLoading(false);}
  };

  return (
    <div className="store-wrap">
      <div className="store-card">
        <div className="store-card-title">📦 Submit Router to Store</div>
        <div style={{fontSize:12,color:'var(--text3)',marginBottom:14,lineHeight:1.5}}>
          Record physical router handover at collection point. Fill in the account number of the collected router.
        </div>
        <label style={{fontSize:11,fontFamily:'var(--fm)',color:'var(--text3)',letterSpacing:'.5px',textTransform:'uppercase',display:'block',marginBottom:6}}>Account Number</label>
        <input className="inp" value={accountNo} onChange={e=>setAccountNo(e.target.value.toUpperCase())}
          placeholder="e.g. 108695502001" autoCapitalize="characters"/>
        <label style={{fontSize:11,fontFamily:'var(--fm)',color:'var(--text3)',letterSpacing:'.5px',textTransform:'uppercase',display:'block',marginBottom:6}}>Remark (optional)</label>
        <textarea className="inp" value={remark} onChange={e=>setRemark(e.target.value)}
          placeholder="Router condition, handover notes…" rows={2} style={{resize:'none'}}/>
        <button className="store-sub-btn" onClick={handleSubmit}
          disabled={!accountNo.trim()||loading}>
          {loading?'Submitting…':'📦 Submit to Store'}
        </button>
      </div>
      {submitted.length>0&&(
        <div className="store-card">
          <div className="store-card-title">✅ Submitted This Session</div>
          {submitted.map((s,i)=>(
            <div key={i} className="store-history">
              <strong>{s.accountNo}</strong> · {s.id} · {s.time}
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  REPORT PAGE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const ReportPage = ({ session, showToast }) => {
  const [dashboard,setDashboard] = useState(null);
  const [loading,  setLoading]   = useState(true);

  useEffect(()=>{
    Api.get({action:'get_exec_dashboard',token:session.token,staffId:session.staffId,city:session.city})
      .then(d=>setDashboard(d)).catch(e=>showToast(e.message,'error'))
      .finally(()=>setLoading(false));
  },[]);

  const download = () => {
    showToast('Visit report downloading…','success');
    const wb=XLSX.utils.book_new();
    const ws=XLSX.utils.json_to_sheet([{
      'Staff':session.staffName,'City':session.city,'Date':Utils.todayStr(),
      'Total Assigned':dashboard?.totalAssigned||0,'Appt Today':dashboard?.apptToday||0,
      'Visited Today':dashboard?.visitedToday||0,'MTD Collected':dashboard?.collectedMTD||0,
    }]);
    XLSX.utils.book_append_sheet(wb,ws,'Exec Summary');
    XLSX.writeFile(wb,'Exec_Report_'+session.staffId+'_'+Utils.todayStr()+'.xlsx');
  };

  return (
    <div>
      <div className="rpt-hdr">
        <div className="rpt-date">{Utils.todayStr()}</div>
        <div className="rpt-title">Field Visit Summary</div>
        <div className="rpt-stats">
          <div className="rpt-stat"><div className="rpt-val">{loading?'…':dashboard?.visitedToday||0}</div><div className="rpt-lbl">Visited Today</div></div>
          <div className="rpt-stat"><div className="rpt-val">{loading?'…':dashboard?.apptToday||0}</div><div className="rpt-lbl">Appts Today</div></div>
          <div className="rpt-stat"><div className="rpt-val">{loading?'…':dashboard?.collectedMTD||0}</div><div className="rpt-lbl">MTD Collected</div></div>
        </div>
      </div>
      <div className="rpt-section">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:700,color:'var(--text2)',letterSpacing:'.5px',textTransform:'uppercase'}}>Summary Stats</div>
          <button className="dl-btn" onClick={download}>📥 Download</button>
        </div>
        {[
          {label:'Total Assigned',val:dashboard?.totalAssigned,icon:'📋'},
          {label:'Appts Today',   val:dashboard?.apptToday,    icon:'📅'},
          {label:'Visited Today', val:dashboard?.visitedToday, icon:'✅'},
          {label:'MTD Collected', val:dashboard?.collectedMTD, icon:'🏆'},
        ].map(r=>(
          <div key={r.label} className="rpt-row">
            <div className="rpt-time">{r.icon}</div>
            <div className="rpt-info">
              <div className="rpt-aname">{r.label}</div>
            </div>
            <div style={{fontFamily:'var(--fm)',fontSize:18,fontWeight:500,color:'var(--accent)'}}>{loading?'…':r.val||0}</div>
          </div>
        ))}
      </div>
    </div>
  );
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 app/(authenticated)/layout.jsx — AppShell
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const AppShell = ({ session, onLogout }) => {
  const [activePage, setActivePage] = useState('dash');
  const { toast, showToast, hideToast } = useToast();

  const handleLogout = useCallback(() => {
    SessionStore.clear();
    onLogout();
  }, [onLogout]);

  useTokenRefresh(session, handleLogout);

  const PAGE_MAP = {
    dash:   <DashboardPage session={session} showToast={showToast} onTabChange={setActivePage} />,
    visits: <VisitsPage session={session} showToast={showToast} />,
    store:  <StorePage  session={session} showToast={showToast} />,
    report: <ReportPage session={session} showToast={showToast} />,
  };

  return (
    <div className="app">
      <AppHeader session={session} onLogout={handleLogout} />
      <div className="main-content">
        {NAV_ITEMS.map(n => (
          <div key={n.id} className={`page${activePage===n.id?' on':''}`}>
            {PAGE_MAP[n.id]}
          </div>
        ))}
      </div>
      <BottomNav active={activePage} onChange={setActivePage} />
      {toast && <Toast msg={toast.msg} type={toast.type} onDone={hideToast} />}
    </div>
  );
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 components/auth/LoginCard.jsx
//  KEY DIFFERENCE FROM TC APP: city dropdown added
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const LoginCard = ({ onLogin }) => {
  const [city,    setCity]    = useState('CBE');
  const [staffId, setStaffId] = useState('');
  const [pin,     setPin]     = useState('');
  const [error,   setError]   = useState('');
  const [shaking, setShaking] = useState(false);
  const { toast, showToast, hideToast } = useToast();

  const shake = useCallback(() => {
    setShaking(true); setTimeout(() => setShaking(false), 450);
  }, []);

  const { login, loading } = useAuth({
    onSuccess: onLogin,
    onError: (msg) => { shake(); setError(msg); showToast(msg,'error'); setPin(''); }
  });

  const handleSubmit = useCallback(() => {
    if (!staffId.trim()) { showToast('Enter your Staff ID'); return; }
    if (pin.length < 4)  { showToast('Enter your 4-digit PIN'); return; }
    setError('');
    login(city, staffId, pin);
  }, [city, staffId, pin, login]);

  // Auto-submit on 4th digit
  useEffect(() => {
    if (pin.length === 4 && staffId.trim()) {
      const t = setTimeout(handleSubmit, 80);
      return () => clearTimeout(t);
    }
  }, [pin, staffId]);

  return (
    <div className="login-screen">
      <div className={`login-card${shaking?' shake':''}`}>

        {/* Brand */}
        <div className="login-logo-wrap">
          <BrandLogo size="lg" />
          <div className="login-title">Executive Console</div>
          <div className="login-sub">CollectPro · VOA Recovery Operations</div>
          <div className="role-pill">👷 Field Executive</div>
        </div>

        {/* City dropdown — unique to Exec App */}
        <div className="form-group">
          <label className="form-label">City</label>
          <div className="select-wrap">
            <select
              className="form-select"
              value={city}
              onChange={e => setCity(e.target.value)}
              disabled={loading}
            >
              <option value="CBE">Coimbatore (CBE)</option>
              <option value="CHN">Chennai (CHN)</option>
            </select>
          </div>
        </div>

        {/* Staff ID */}
        <div className="form-group">
          <label className="form-label">Staff ID</label>
          <input
            className="form-input"
            type="text"
            value={staffId}
            onChange={e => setStaffId(e.target.value.toUpperCase())}
            onKeyDown={e => e.key==='Enter' && handleSubmit()}
            placeholder="e.g. EX_001"
            autoCapitalize="characters"
            autoCorrect="off"
            spellCheck={false}
            disabled={loading}
          />
        </div>

        {/* PIN */}
        <div className="form-group" style={{marginBottom:8}}>
          <label className="form-label">PIN</label>
          <input
            className="form-input pin-field"
            type="password"
            inputMode="numeric"
            pattern="[0-9]*"
            maxLength={4}
            value={pin}
            onChange={e => setPin(Utils.sanitizePin(e.target.value))}
            onKeyDown={e => e.key==='Enter' && handleSubmit()}
            placeholder="• • • •"
            disabled={loading}
          />
        </div>

        <PinDots length={pin.length} />

        <button className="btn-login" onClick={handleSubmit} disabled={loading}>
          {loading
            ? <><div className="spinner"/><span>Signing in...</span></>
            : 'Sign In →'
          }
        </button>

        {error && <div className="login-error">{error}</div>}
      </div>

      {toast && <Toast msg={toast.msg} type={toast.type} onDone={hideToast} />}
    </div>
  );
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 app/page.jsx — Root auth gate
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const App = () => {
  const [session,  setSession]  = useState(null);
  const [checking, setChecking] = useState(true);

  useEffect(() => {
    const saved = SessionStore.load();
    if (saved) setSession(saved);
    setChecking(false);
  }, []);

  if (checking) return (
    <div className="load-overlay">
      <div className="load-spinner"/>
      <div className="load-text">CollectPro loading...</div>
    </div>
  );

  return session
    ? <AppShell session={session} onLogout={() => setSession(null)} />
    : <LoginCard onLogin={s => setSession(s)} />;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
