<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
:root{
  --bg:#fff5f5;--bg2:#fff;--bg3:#fef2f2;
  --accent:#dc2626;--accent-lt:#fef2f2;--accent-dk:#b91c1c;
  --green:#16a34a;--green-lt:#f0fdf4;
  --blue:#3b82f6;--blue-lt:#eff6ff;
  --amber:#d97706;--amber-lt:#fffbeb;
  --purple:#7c3aed;--purple-lt:#f5f3ff;
  --teal:#0d9488;--teal-lt:#f0fdfa;
  --border:#e4e8ef;--border2:#d0d7e3;
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06);
  --shadow:0 4px 16px rgba(0,0,0,.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
  --r:14px;
  --fh:'Sora',sans-serif;--fm:'JetBrains Mono',monospace;--fb:'Plus Jakarta Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;width:100%;overflow:hidden}@supports(height:100dvh){.app{height:100dvh!important}}
body{background:var(--bg);color:var(--text);font-family:var(--fb);-webkit-font-smoothing:antialiased}

@keyframes fadeUp  {from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn  {from{opacity:0}to{opacity:1}}
@keyframes shake   {0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
@keyframes spin    {to{transform:rotate(360deg)}}
@keyframes dotPop  {0%{transform:scale(.8);opacity:.4}50%{transform:scale(1.2);opacity:1}100%{transform:scale(1);opacity:1}}
@keyframes slideIn {from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse   {0%,100%{opacity:1}50%{opacity:.5}}
@keyframes shimmer {0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── LOGIN ── */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#fff5f5,#f8f9fb,#fff);padding:24px}
.login-card{background:#fff;border:1px solid var(--border);border-radius:24px;padding:44px 36px;width:100%;max-width:390px;box-shadow:var(--shadow-lg);animation:fadeUp .4s ease}
.login-card.shake{animation:shake .4s ease}
.login-logo-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:36px}
.login-title{font-family:var(--fh);font-size:24px;font-weight:700}
.login-sub{font-size:13px;color:var(--text3);text-align:center;line-height:1.5}
.role-pill{display:inline-flex;align-items:center;gap:6px;background:var(--accent-lt);border:1px solid rgba(220,38,38,.25);color:var(--accent);border-radius:20px;padding:5px 14px;font-family:var(--fm);font-size:11px;font-weight:700;letter-spacing:.5px;margin-top:4px}
.form-group{margin-bottom:18px}
.form-label{font-size:11px;font-family:var(--fm);letter-spacing:1px;color:var(--text3);margin-bottom:8px;display:block;text-transform:uppercase}
.form-input,.form-select{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:12px;padding:13px 15px;color:var(--text);font-family:var(--fb);font-size:15px;outline:none;transition:all .2s;-webkit-appearance:none}
.form-input:focus,.form-select:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(220,38,38,.1)}
.form-input.pin-field{font-family:var(--fm);font-size:22px;text-align:center;letter-spacing:.3em}
.select-wrap{position:relative}
.select-wrap::after{content:'▾';position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}
.pin-dots{display:flex;gap:10px;justify-content:center;margin:4px 0 20px}
.pin-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--border2);background:transparent;transition:all .15s}
.pin-dot.filled{background:var(--accent);border-color:var(--accent);animation:dotPop .2s ease}
.btn-login{width:100%;padding:15px;background:linear-gradient(135deg,var(--accent),var(--accent-dk));border:none;border-radius:14px;color:#fff;font-family:var(--fh);font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(220,38,38,.3);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-login:active{transform:scale(.98)}
.btn-login:disabled{opacity:.55;cursor:not-allowed;box-shadow:none}
.login-error{background:var(--accent-lt);border:1px solid rgba(220,38,38,.2);border-radius:10px;padding:11px 14px;font-size:13px;color:var(--accent);margin-top:12px;text-align:center;animation:fadeIn .2s ease}

/* ── SHELL ── */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm);flex-shrink:0}
.brand{display:flex;align-items:center;gap:10px}
.brand-logo{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent-dk));border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-weight:800;font-size:11px;color:#fff;letter-spacing:.5px}
.brand-name{font-family:var(--fh);font-size:16px;font-weight:700}
.brand-role{font-family:var(--fm);font-size:10px;color:var(--accent);background:var(--accent-lt);padding:3px 9px;border-radius:20px;border:1px solid rgba(220,38,38,.2);letter-spacing:.5px}
.hdr-right{display:flex;align-items:center;gap:8px}
.city-badge{font-family:var(--fm);font-size:10px;font-weight:700;color:var(--accent);background:var(--accent-lt);padding:4px 9px;border-radius:20px;border:1px solid rgba(220,38,38,.2);letter-spacing:.5px}
.staff-badge{font-family:var(--fm);font-size:11px;color:var(--text2);background:var(--bg3);padding:5px 10px;border-radius:8px;border:1px solid var(--border)}
.logout-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--text3);cursor:pointer;padding:5px 10px;font-size:12px;font-family:var(--fb);transition:all .15s}
.logout-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── NAV ── */
.bnav{display:flex;background:var(--bg2);border-top:1px solid var(--border);height:60px;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom);position:sticky;bottom:0;z-index:99;width:100%}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;cursor:pointer;color:var(--text3);font-size:10px;font-family:var(--fb);font-weight:600;transition:color .2s;padding:0;position:relative}
.ni .ico{font-size:18px}
.ni.on{color:var(--accent)}
.nav-dot{position:absolute;top:8px;right:calc(50% - 14px);width:7px;height:7px;border-radius:50%;background:var(--accent);border:2px solid var(--bg2)}

/* ── PAGES ── */
.main-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0}
.page{display:none;padding-bottom:80px}
.page.on{display:block;animation:fadeIn .2s ease}

/* ── SHARED COMPONENTS ── */
.wrap{padding:16px}
.section-title{font-family:var(--fh);font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--shadow-sm)}
.card-title{font-family:var(--fh);font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.row:last-child{border-bottom:none}
.row-label{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:6px}
.row-val{font-family:var(--fm);font-size:12px;font-weight:700;color:var(--text)}
.row-val.green{color:var(--green)}
.row-val.red{color:var(--accent)}
.row-val.amber{color:var(--amber)}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;box-shadow:var(--shadow-sm)}
.stat-icon{font-size:18px;margin-bottom:6px}
.stat-val{font-family:var(--fh);font-size:26px;font-weight:800;line-height:1}
.stat-val.red{color:var(--accent)}
.stat-val.green{color:var(--green)}
.stat-val.amber{color:var(--amber)}
.stat-val.purple{color:var(--purple)}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:3px;font-weight:500}
.badge{font-size:10px;font-family:var(--fm);font-weight:700;padding:2px 8px;border-radius:20px}
.badge.green{background:var(--green-lt);color:var(--green);border:1px solid #86efac}
.badge.red{background:var(--accent-lt);color:var(--accent);border:1px solid rgba(220,38,38,.3)}
.badge.amber{background:var(--amber-lt);color:var(--amber);border:1px solid #fde68a}
.badge.blue{background:var(--blue-lt);color:var(--blue);border:1px solid #bfdbfe}
.badge.purple{background:var(--purple-lt);color:var(--purple);border:1px solid #ddd6fe}
.btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),var(--accent-dk));border:none;border-radius:var(--r);color:#fff;font-family:var(--fh);font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(220,38,38,.25);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px}
.btn-primary:active{transform:scale(.98)}
.btn-primary:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}
.btn-secondary{width:100%;padding:12px;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text2);font-family:var(--fh);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px}
.btn-secondary:active{transform:scale(.98)}
.btn-excel{width:100%;padding:13px;background:linear-gradient(135deg,#166534,#15803d);border:none;border-radius:var(--r);color:#fff;font-family:var(--fh);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;transition:all .2s}
.btn-excel:active{transform:scale(.98)}
.toggle-wrap{display:flex;border-radius:10px;overflow:hidden;border:1.5px solid var(--border);height:34px}
.toggle-opt{padding:0 14px;border:none;font-family:var(--fm);font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;background:transparent;color:var(--text3)}
.toggle-opt.on{background:var(--accent);color:#fff}
.toggle-opt.on.green{background:var(--green)}
.toggle-opt.on.amber{background:var(--amber)}
.warn-banner{display:flex;align-items:flex-start;gap:10px;background:var(--amber-lt);border:1px solid #fde68a;border-radius:10px;padding:12px 14px;margin-bottom:10px;animation:slideIn .3s ease}
.warn-banner-text{font-size:12px;color:var(--amber);line-height:1.5;font-weight:500}
.warn-codes{font-family:var(--fm);font-size:11px;color:var(--amber);margin-top:3px;word-break:break-all}
.alert-card{display:flex;align-items:flex-start;gap:10px;border-radius:12px;padding:12px 14px;margin-bottom:10px;animation:slideIn .3s ease}
.alert-card.red{background:var(--accent-lt);border:1px solid rgba(220,38,38,.25)}
.alert-card.amber{background:var(--amber-lt);border:1px solid #fde68a}
.alert-card.green{background:var(--green-lt);border:1px solid #86efac}
.alert-icon{font-size:18px;flex-shrink:0}
.alert-title{font-size:13px;font-weight:700;margin-bottom:2px}
.alert-card.red .alert-title{color:var(--accent)}
.alert-card.amber .alert-title{color:var(--amber)}
.alert-card.green .alert-title{color:var(--green)}
.alert-sub{font-size:11px;color:var(--text3);line-height:1.5}
.skeleton{background:linear-gradient(90deg,var(--bg3) 25%,var(--border) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:8px}

/* ── UPLOAD TAB ── */
.upload-zone{border:2px dashed var(--border2);border-radius:var(--r);padding:32px 20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg2);margin-bottom:16px;position:relative}
.upload-zone.drag-over{border-color:var(--accent);background:var(--accent-lt)}
.upload-zone.has-file{border-color:var(--green);border-style:solid;background:var(--green-lt)}
.upload-zone-icon{font-size:36px;margin-bottom:10px}
.upload-zone-title{font-family:var(--fh);font-size:15px;font-weight:700;margin-bottom:4px}
.upload-zone.has-file .upload-zone-title{color:var(--green)}
.upload-zone-sub{font-size:12px;color:var(--text3)}
.upload-zone.has-file .upload-zone-sub{color:var(--green);font-weight:600}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.file-info{display:flex;align-items:center;gap:10px;background:var(--green-lt);border:1px solid #86efac;border-radius:10px;padding:10px 14px;margin-bottom:14px;animation:slideIn .3s ease}
.file-name{font-size:13px;font-weight:700;color:var(--green);flex:1;word-break:break-all}
.file-rows{font-family:var(--fm);font-size:11px;color:var(--green)}
.file-clear{background:none;border:none;font-size:16px;cursor:pointer;color:var(--text3);padding:2px 6px;border-radius:6px}
.config-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:16px;box-shadow:var(--shadow-sm)}
.config-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.config-row:last-child{border-bottom:none}
.config-row.col{flex-direction:column;align-items:flex-start;gap:8px}
.config-label{font-size:13px;font-weight:600;color:var(--text)}
.config-sub{font-size:11px;color:var(--text3);margin-top:2px}
.batch-input{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-family:var(--fm);font-size:13px;outline:none;transition:all .2s}
.batch-input:focus{border-color:var(--accent);background:#fff}
.progress-wrap{margin-bottom:20px}
.progress-label{font-size:12px;font-family:var(--fm);color:var(--text2);margin-bottom:8px;display:flex;justify-content:space-between}
.progress-bar-outer{height:8px;background:var(--border);border-radius:6px;overflow:hidden}
.progress-bar-inner{height:8px;border-radius:6px;transition:width .4s ease;background:linear-gradient(90deg,var(--accent),var(--accent-dk))}
.progress-step{font-size:11px;color:var(--text3);font-family:var(--fm);margin-top:6px;text-align:center}

/* ── QUALITY REPORT ── */
.qr-hero{border-radius:var(--r);padding:18px;margin-bottom:14px;animation:slideIn .3s ease}
.qr-hero.excellent{background:linear-gradient(135deg,var(--green-lt),#dcfce7);border:1px solid #86efac}
.qr-hero.good     {background:linear-gradient(135deg,var(--teal-lt),#ccfbf1);border:1px solid #5eead4}
.qr-hero.average  {background:linear-gradient(135deg,var(--amber-lt),#fef9c3);border:1px solid #fde68a}
.qr-hero.poor     {background:var(--accent-lt);border:1px solid rgba(220,38,38,.25)}
.qr-hero-label{font-size:11px;font-family:var(--fm);letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
.qr-hero.excellent .qr-hero-label{color:var(--green)}
.qr-hero.good      .qr-hero-label{color:var(--teal)}
.qr-hero.average   .qr-hero-label{color:var(--amber)}
.qr-hero.poor      .qr-hero-label{color:var(--accent)}
.qr-score{font-family:var(--fh);font-size:48px;font-weight:800;line-height:1;margin-bottom:4px}
.qr-hero.excellent .qr-score{color:var(--green)}
.qr-hero.good      .qr-score{color:var(--teal)}
.qr-hero.average   .qr-score{color:var(--amber)}
.qr-hero.poor      .qr-score{color:var(--accent)}
.qr-msg{font-size:13px;font-weight:600}
.qr-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
.qr-stat{background:var(--bg2);padding:12px 8px;text-align:center}
.qr-stat-val{font-family:var(--fh);font-size:22px;font-weight:800;line-height:1}
.qr-stat-val.g{color:var(--green)}
.qr-stat-val.r{color:var(--accent)}
.qr-stat-val.a{color:var(--amber)}
.qr-stat-lbl{font-size:10px;font-family:var(--fm);color:var(--text3);margin-top:3px;text-transform:uppercase}
.qr-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.qr-bar-label{font-size:12px;color:var(--text2);width:100px;flex-shrink:0;font-weight:500}
.qr-bar-outer{flex:1;height:7px;background:var(--border);border-radius:4px;overflow:hidden}
.qr-bar-inner{height:7px;border-radius:4px;transition:width .5s ease}
.qr-bar-count{font-family:var(--fm);font-size:11px;font-weight:700;width:30px;text-align:right;flex-shrink:0}

/* ── BATCH HISTORY ── */
.batch-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;box-shadow:var(--shadow-sm)}
.batch-score-circle{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:13px;font-weight:800;flex-shrink:0}
.batch-score-circle.excellent{background:var(--green-lt);color:var(--green);border:2px solid #86efac}
.batch-score-circle.good     {background:var(--teal-lt);color:var(--teal);border:2px solid #5eead4}
.batch-score-circle.average  {background:var(--amber-lt);color:var(--amber);border:2px solid #fde68a}
.batch-score-circle.poor     {background:var(--accent-lt);color:var(--accent);border:2px solid rgba(220,38,38,.3)}
.batch-info{flex:1}
.batch-no{font-family:var(--fh);font-size:13px;font-weight:700;color:var(--text)}
.batch-meta{font-size:11px;color:var(--text3);font-family:var(--fm);margin-top:2px}
.batch-stats{text-align:right}
.batch-workable{font-family:var(--fh);font-size:14px;font-weight:800;color:var(--green)}
.batch-rejected{font-size:11px;color:var(--accent);font-family:var(--fm)}

/* ── TEAM TAB ── */
.lb-row{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;box-shadow:var(--shadow-sm);animation:slideIn .3s ease}
.lb-rank{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;font-family:var(--fh)}
.lb-rank.r1{background:var(--amber-lt);color:var(--amber)}
.lb-rank.r2{background:#f1f5f9;color:var(--text2)}
.lb-rank.r3{background:#fff7ed;color:#9a3412}
.lb-rank.rx{background:var(--bg3);color:var(--text3)}

<div id="root"></div>
<script>
const {
  useState,
  useEffect,
  useCallback,
  useRef,
  useMemo
} = React;

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 lib/constants.js
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const CONFIG = {
  API_URL: 'https://script.google.com/macros/s/AKfycbyRb7oEMdppJKouU5xCAQVq-IauFaugqXslscYChoFaXkvWzIQzHCg9q5u3AZWAlxB_Pg/exec',
  CLIENT_ID: 'VOA_CBE',
  SESSION_KEY: 'voa_session_admin',
  REFRESH_MS: 25 * 60 * 1000,
  ALLOWED_ROLES: ['ADMIN', 'SUPERVISOR', 'OPS_MANAGER'],
  CITIES: ['CBE', 'CHN']
};
const NAV_TABS = [{
  id: 'home',
  icon: '🏠',
  label: 'Home'
}, {
  id: 'upload',
  icon: '📤',
  label: 'Upload'
}, {
  id: 'team',
  icon: '👥',
  label: 'Team'
}, {
  id: 'staff',
  icon: '🧑‍💼',
  label: 'Staff'
}, {
  id: 'pending',
  icon: '📋',
  label: 'Pending'
}, {
  id: 'issues',
  icon: '⚠️',
  label: 'Issues'
}, {
  id: 'control',
  icon: '⚙️',
  label: 'Control'
}];
const ISSUE_TYPES = [{
  id: 'ALL',
  label: 'All'
}, {
  id: 'ISSUE_JBOX',
  label: 'J-Box'
}, {
  id: 'ISSUE_REFUND',
  label: 'Refund'
}, {
  id: 'ISSUE_MAIL',
  label: 'Mail Confirm'
}, {
  id: 'ISSUE_RECONNECTION',
  label: 'Reconnect'
}, {
  id: 'ISSUE_ADDR',
  label: 'Addr Change'
}];
const ISSUE_SHORT = {
  ISSUE_JBOX: 'JBOX',
  ISSUE_REFUND: 'REFUND',
  ISSUE_MAIL: 'MAIL',
  ISSUE_RECONNECTION: 'RECONNECTION',
  ISSUE_ADDR: 'ADDR'
};
const STATUS_LABELS = {
  FRESH: 'Fresh',
  CALLED: 'Called',
  APPT_FIXED: 'Appt Fixed',
  NOT_VISITED: 'Not Visited',
  RESCHEDULED: 'Rescheduled',
  NOT_REACHABLE: 'Not Reachable',
  STRIKE_1: 'Strike 1',
  STRIKE_2: 'Strike 2',
  STRIKE_3: 'Strike 3',
  ISSUE_REFUND: 'Refund Issue',
  ISSUE_RECONNECTION: 'Reconnection',
  ISSUE_MAIL: 'Mail Confirm',
  ISSUE_JBOX: 'JBox Issue',
  ISSUE_ADDR: 'Addr Change',
  COOLING: 'Cooling',
  COOLING_POOL: 'Cooling Pool'
};

// COLUMN_MAP removed in v3.1
// Backend owns all column normalization — see 03_BaseProcessor.gs _ACT_COL_MAP

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 lib/api.js
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const Api = {
  async get(p) {
    const url = new URL(CONFIG.API_URL);
    url.searchParams.append('client_id', CONFIG.CLIENT_ID);
    Object.entries(p).forEach(([k, v]) => url.searchParams.append(k, String(v)));
    const r = await fetch(url.toString());
    if (!r.ok) throw new Error('Network error');
    const j = await r.json();
    if (!j.success) throw new Error(j.error || 'Request failed');
    return j.data;
  },
  async post(body) {
    const r = await fetch(CONFIG.API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'text/plain'
      },
      body: JSON.stringify({
        client_id: CONFIG.CLIENT_ID,
        ...body
      })
    });
    if (!r.ok) throw new Error('Network error');
    const j = await r.json();
    if (!j.success) throw new Error(j.error || 'Request failed');
    return j.data;
  }
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 lib/session.js
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const SS = {
  save(d) {
    try {
      localStorage.setItem(CONFIG.SESSION_KEY, JSON.stringify(d));
    } catch {}
  },
  load() {
    try {
      const r = localStorage.getItem(CONFIG.SESSION_KEY);
      if (!r) return null;
      const s = JSON.parse(r);
      const p = (s.token || '').split('|');
      if (p.length !== 5 || Date.now() > parseInt(p[4])) {
        this.clear();
        return null;
      }
      return s;
    } catch {
      return null;
    }
  },
  clear() {
    try {
      localStorage.removeItem(CONFIG.SESSION_KEY);
    } catch {}
  }
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 lib/utils.js
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const Utils = {
  greeting() {
    const h = new Date().getHours();
    return h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
  },
  dateStr() {
    return new Date().toLocaleDateString('en-IN', {
      weekday: 'long',
      day: 'numeric',
      month: 'long',
      year: 'numeric'
    });
  },
  pin: v => String(v).replace(/\D/g, '').slice(0, 4),
  name1: n => (n || '').split(' ')[0],
  initials: n => (n || '').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase(),
  hoursAgo(iso) {
    if (!iso) return 0;
    return Math.round((Date.now() - new Date(iso).getTime()) / 3600000);
  },

function parseExcel(file) {
  // ── v3.1: Send raw rows with original headers to backend.
  // Backend owns ALL column normalization via _normalizeHeaders().
  // No frontend column mapping — works with any ACT Excel format.
  return new Promise((res, rej) => {
    const rd = new FileReader();
    rd.onload = e => {
      try {
        const wb = XLSX.read(new Uint8Array(e.target.result), {
          type: 'array'
        });
        const raw = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {
          defval: ''
        });
        if (!raw.length) {
          rej(new Error('File is empty'));
          return;
        }
        // Send raw rows as-is — backend handles header normalization
        res({
          rows: raw,
          total: raw.length,
          mapped: raw.length
        });
      } catch (err) {
        rej(new Error('Parse failed: ' + err.message));
      }
    };
    rd.onerror = () => rej(new Error('File read failed'));
    rd.readAsArrayBuffer(file);
  });
}
